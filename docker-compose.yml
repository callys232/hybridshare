version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: hybridshare-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: hybridshare
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: hybridshare
      PGDATA: /data/postgres
    volumes:
      - postgres_data:/data/postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hybridshare -d hybridshare"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hybridshare-net

  redis:
    image: redis:7-alpine
    container_name: hybridshare-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hybridshare-net

  minio:
    image: minio/minio:latest
    container_name: hybridshare-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - hybridshare-net

  meilisearch:
    image: getmeili/meilisearch:latest
    container_name: hybridshare-meilisearch
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_API_KEY:-masterKey}
      MEILI_ENV: development
    volumes:
      - meilisearch_data:/meili_data
    ports:
      - "7700:7700"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - hybridshare-net

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: hybridshare-api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://hybridshare:${POSTGRES_PASSWORD:-password}@postgres:5432/hybridshare
      REDIS_URL: redis://:${REDIS_PASSWORD:-}@redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MEILISEARCH_HOST: http://meilisearch:7700
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - hybridshare-net
    volumes:
      - /var/run/clamav:/var/run/clamav:ro

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: hybridshare-web
    restart: unless-stopped
    env_file: .env
    environment:
      NEXT_PUBLIC_API_URL: http://api:4000
      NEXT_PUBLIC_APP_URL: ${APP_URL}
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - hybridshare-net

  prometheus:
    image: prom/prometheus:latest
    container_name: hybridshare-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=30d'
    volumes:
      - ./infra/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - hybridshare-net

  grafana:
    image: grafana/grafana:latest
    container_name: hybridshare-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-changeme}
      GF_USERS_ALLOW_SIGN_UP: 'false'
      GF_SERVER_ROOT_URL: ${APP_URL}/grafana
      GF_SERVER_SERVE_FROM_SUB_PATH: 'true'
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    networks:
      - hybridshare-net

  nginx:
    image: nginx:alpine
    container_name: hybridshare-nginx
    restart: unless-stopped
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - api
      - web
      - grafana
    networks:
      - hybridshare-net

volumes:
  postgres_data:
  redis_data:
  minio_data:
  meilisearch_data:
  prometheus_data:
  grafana_data:
  certbot_www:

networks:
  hybridshare-net:
    driver: bridge
