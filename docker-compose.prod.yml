version: '3.9'

services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: production
    environment:
      NODE_ENV: production
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure
        max_attempts: 3

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: production
    environment:
      NODE_ENV: production
    deploy:
      replicas: 2

  postgres:
    deploy:
      placement:
        constraints:
          - node.role == manager

  redis:
    command: >
      redis-server
      --appendonly yes
      --appendfsync always
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru

  minio:
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
      MINIO_SITE_NAME: hybridshare-production

  meilisearch:
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_API_KEY}
      MEILI_ENV: production
      MEILI_NO_ANALYTICS: 'true'
